<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Style Transfer · AdaIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}" />
</head>
<body>

  <!-- particle canvas -->
  <canvas id="particles-canvas"></canvas>

  <div class="container">
    <!-- HERO -->
    <div class="hero">
      <h1>Neural Style Transfer <span style="font-weight:300;">·</span> AdaIN</h1>
      <p>Transform any photograph into artwork using Deep Learning.</p>
    </div>

    <!-- MAIN FORM (preserve action & method) -->
    <form id="styleForm" action="/" method="post" enctype="multipart/form-data">
      <!-- Upload row -->
      <div class="upload-row">
        <!-- Content -->
        <div class="upload-card" id="contentDrop">
          <div class="icon-wrap"><i class="fas fa-image"></i></div>
          <h3>Content Image</h3>
          <span class="file-label"><i class="far fa-file-image"></i> JPEG / PNG</span>
          <input type="file" name="content" id="contentInput" accept="image/*" />
          <div id="contentPreviewWrap" class="mt-1" style="width:100%;">
            <img id="contentPreview" class="preview-img hidden" src="#" alt="content preview" />
            <div id="contentPlaceholder" class="placeholder-text"><i class="fas fa-cloud-upload-alt"></i> drop or click</div>
          </div>
        </div>

        <!-- Style -->
        <div class="upload-card" id="styleDrop">
          <div class="icon-wrap"><i class="fas fa-palette"></i></div>
          <h3>Style Image</h3>
          <span class="file-label"><i class="far fa-file-image"></i> JPEG / PNG</span>
          <input type="file" name="style" id="styleInput" accept="image/*" />
          <div id="stylePreviewWrap" class="mt-1" style="width:100%;">
            <img id="stylePreview" class="preview-img hidden" src="#" alt="style preview" />
            <div id="stylePlaceholder" class="placeholder-text"><i class="fas fa-cloud-upload-alt"></i> drop or click</div>
          </div>
        </div>
      </div>

      <!-- Generate -->
      <div class="generate-wrap">
        <button type="submit" class="btn-generate" id="generateBtn">
          <span id="btnText"><i class="fas fa-wand-magic-sparkles" style="margin-right:0.6rem;"></i> Generate Artwork</span>
          <span id="btnSpinner" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>
    </form>

    <!-- RESULTS (displayed after generation) -->
    <div id="resultsSection" class="hidden">
      <div class="results-grid">
        <!-- content result -->
        <div class="result-card" id="contentResultCard">
          <img id="resultContentImg" src="#" alt="content" />
          <div class="label"><i class="fas fa-image"></i> Content</div>
        </div>
        <!-- style result -->
        <div class="result-card" id="styleResultCard">
          <img id="resultStyleImg" src="#" alt="style" />
          <div class="label"><i class="fas fa-palette"></i> Style</div>
        </div>
        <!-- output result -->
        <div class="result-card" id="outputResultCard">
          <img id="resultOutputImg" src="#" alt="stylized" />
          <div class="label"><i class="fas fa-robot"></i> Stylized Output</div>
        </div>
      </div>
      <!-- Download -->
      <div class="download-wrap">
        <a id="downloadLink" href="#" download="stylized_output.png" class="btn-download">
          <i class="fas fa-download"></i> Download Result
        </a>
      </div>
    </div>

    <!-- Backend will inject the result_image here if using template rendering -->
    {% if result_image %}
    <div style="display: none;" id="backend-result-container">
      <img src="{{ result_image }}" id="backend-result-img" />
    </div>
    {% endif %}
  </div>

  <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
